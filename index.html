<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Beck Watts</title>

<style>
:root{
    --bg:#f5f5f2;
    --text:#111;
    --muted:#666;
    --rule:#d5d5d5;
    --accent:#e30613;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    font-size:16px;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:
        "Helvetica Neue",
        Helvetica,
        Arial,
        sans-serif;
}

main{
    min-height:100vh;

    display:grid;
    grid-template-columns:repeat(12,1fr);
    gap:2rem;

    padding:
        clamp(2rem,5vw,5rem)
        clamp(2rem,5vw,5rem);
}

.hero{
    grid-column:1 / span 7;

    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

aside{
    grid-column:9 / span 4;

    display:flex;
    flex-direction:column;
    justify-content:flex-end;
}

.label{
    color:var(--accent);
    text-transform:uppercase;
    letter-spacing:.18em;
    font-size:.75rem;
    font-weight:600;
}

h1{
    margin-top:6rem;

    font-size:clamp(4rem,11vw,8rem);
    line-height:.88;
    font-weight:700;
    letter-spacing:-.07em;
}

.bio{
    max-width:32rem;

    margin-top:3rem;

    font-size:1.05rem;
    line-height:1.7;
    color:var(--muted);
}

.links{
    width:100%;
}

.links a{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:1.1rem 0;

    border-top:1px solid var(--rule);

    color:var(--text);
    text-decoration:none;

    font-size:1rem;

    transition:
        padding .18s ease,
        color .18s ease;
}

.links a:last-child{
    border-bottom:1px solid var(--rule);
}

.links span:last-child{
    color:var(--muted);
}

.links a:hover{
    color:var(--accent);
    padding-left:.75rem;
}

footer{
    margin-top:3rem;

    font-size:.8rem;
    color:var(--muted);

    display:flex;
    justify-content:space-between;
}

@media (max-width:900px){

main{
    grid-template-columns:1fr;
    gap:4rem;
}

.hero,
aside{
    grid-column:auto;
}

h1{
    margin-top:3rem;
    font-size:4rem;
}

footer{
    flex-direction:column;
    gap:.5rem;
}

}

@media (prefers-color-scheme:dark){

:root{
    --bg:#090909;
    --text:#f5f5f5;
    --muted:#9c9c9c;
    --rule:#2d2d2d;
}

}
</style>
</head>

<body>

<main>

<section class="hero">

<div>

<p class="label">
INFORMATION INDEX
</p>

<h1>
Beck<br>
Watts
</h1>

<p class="bio">
Mechanical engineering student. Exploring the intersection between intentional design and practical engineering.
</p>


</div>

<footer>
<span>BC, Canada / WA, USA</span>
<span>2026</span>
</footer>

</section>

</nav>

</aside>

</main>



</body></html>
